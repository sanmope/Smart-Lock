services:
  # --- Kafka (KRaft, no Zookeeper) ---
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smartlock
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # --- Topic initialization ---
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic smartlock.lock.status-changes --partitions 12 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic smartlock.security.events --partitions 12 \
          --config retention.ms=2592000000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic smartlock.lock.location-updates --partitions 24 \
          --config retention.ms=259200000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic smartlock.shipment.status-changes --partitions 6 \
          --config retention.ms=1209600000
        echo "Topics created."

  # --- PostgreSQL (operational DB) ---
  postgres:
    image: postgres:16
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER}
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redshift local (PostgreSQL on 5439) ---
  redshift-local:
    image: postgres:16
    hostname: redshift-local
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: ${REDSHIFT_USER}
      POSTGRES_PASSWORD: ${REDSHIFT_PASSWORD}
      POSTGRES_DB: ${REDSHIFT_DB}
    volumes:
      - redshift-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${REDSHIFT_USER}
      interval: 5s
      timeout: 5s
      retries: 5

  # --- LocalStack (S3 emulation) ---
  localstack:
    image: localstack/localstack:3.0
    hostname: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: ${AWS_REGION}
    volumes:
      - localstack-data:/var/lib/localstack

  localstack-init:
    image: amazon/aws-cli:2.15.0
    depends_on:
      - localstack
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_REGION}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        aws --endpoint-url=http://localstack:4566 s3 mb s3://${S3_STAGING_BUCKET} || true
        echo "S3 bucket created."

  # --- FastAPI (producer) ---
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      kafka:
        condition: service_healthy

  # --- Kafka Consumer -> PostgreSQL ---
  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      kafka:
        condition: service_healthy

  # --- Spark ---
  spark-master:
    image: apache/spark:3.5.0
    hostname: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master

  spark-worker:
    image: apache/spark:3.5.0
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
    ports:
      - "8083:8081"

volumes:
  kafka-data:
  postgres-data:
  redshift-data:
  localstack-data:
